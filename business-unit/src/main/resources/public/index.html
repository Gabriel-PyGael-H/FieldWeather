<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>FieldWeather Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        :root {
          --bg: #0d0f14; --bg2: #151820; --border: #2a2f42;
          --accent: #e8c547; --accent2: #4fc3f7; --text: #e8eaf0;
          --muted: #6b7280; --past: #1e2535; --future: #0f2318;
          --green: #34d399; --red: #f87171; --radius: 12px;
        }
        body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
        header {
          background: var(--bg2); border-bottom: 1px solid var(--border);
          padding: 0 40px; display: flex; align-items: center;
          justify-content: space-between; height: 64px; position: sticky; top: 0; z-index: 100;
        }
        .logo { font-family: 'Bebas Neue', sans-serif; font-size: 26px; letter-spacing: 2px; color: var(--accent); }
        .logo span { color: var(--text); }
        .status-dot {
          width: 8px; height: 8px; border-radius: 50%; background: var(--green);
          box-shadow: 0 0 8px var(--green); display: inline-block; margin-right: 8px;
          animation: pulse 2s infinite;
        }
        @keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:0.4; } }
        .status-label { font-size: 13px; color: var(--muted); }
        main { max-width: 1100px; margin: 0 auto; padding: 40px 24px 80px; }
        .stats-bar { display: grid; grid-template-columns: repeat(3,1fr); gap: 16px; margin-bottom: 40px; }
        .stat-card {
          background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius);
          padding: 20px 24px; display: flex; flex-direction: column; gap: 4px; transition: border-color .2s;
        }
        .stat-card:hover { border-color: var(--accent); }
        .stat-label { font-size: 11px; text-transform: uppercase; letter-spacing: 1px; color: var(--muted); }
        .stat-value { font-family: 'Bebas Neue', sans-serif; font-size: 36px; color: var(--accent); line-height: 1; }
        .toolbar { display: flex; gap: 12px; margin-bottom: 28px; flex-wrap: wrap; align-items: center; }
        .search-wrap { position: relative; flex: 1; min-width: 220px; }
        .search-wrap svg { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); color: var(--muted); }
        input[type="text"] {
          width: 100%; background: var(--bg2); border: 1px solid var(--border); border-radius: 8px;
          padding: 10px 14px 10px 40px; color: var(--text); font-family: 'DM Sans', sans-serif;
          font-size: 14px; outline: none; transition: border-color .2s;
        }
        input[type="text"]:focus { border-color: var(--accent); }
        input[type="text"]::placeholder { color: var(--muted); }
        .filter-btn {
          padding: 10px 20px; border-radius: 8px; border: 1px solid var(--border);
          background: var(--bg2); color: var(--muted); font-family: 'DM Sans', sans-serif;
          font-size: 13px; cursor: pointer; transition: all .2s;
        }
        .filter-btn:hover, .filter-btn.active { border-color: var(--accent); color: var(--accent); background: rgba(232,197,71,.08); }
        .section-title {
          font-family: 'Bebas Neue', sans-serif; font-size: 22px; letter-spacing: 2px;
          color: var(--text); margin-bottom: 16px; display: flex; align-items: center; gap: 10px;
        }
        .section-title::after { content: ''; flex: 1; height: 1px; background: var(--border); }
        .matches-grid { display: flex; flex-direction: column; gap: 12px; }
        .match-card {
          background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius);
          padding: 20px 24px; display: grid; grid-template-columns: 1fr auto 1fr;
          gap: 16px; align-items: center; transition: border-color .2s, transform .15s;
          animation: fadeUp .4s ease both;
        }
        .match-card:hover { border-color: var(--accent); transform: translateY(-1px); }
        .match-card.future { background: var(--future); border-color: rgba(52,211,153,.25); }
        .match-card.past { background: var(--past); }
        @keyframes fadeUp { from { opacity:0; transform:translateY(12px); } to { opacity:1; transform:translateY(0); } }
        .team-block { display: flex; flex-direction: column; gap: 4px; }
        .team-block.right { text-align: right; align-items: flex-end; }
        .team-name { font-size: 15px; font-weight: 600; color: var(--text); line-height: 1.2; }
        .team-city { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: .5px; }
        .score-block { display: flex; flex-direction: column; align-items: center; gap: 4px; min-width: 120px; }
        .score { font-family: 'Bebas Neue', sans-serif; font-size: 28px; color: var(--accent); letter-spacing: 2px; }
        .match-meta { font-size: 11px; color: var(--muted); text-align: center; }
        .status-badge { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: .5px; }
        .badge-finished { background: rgba(107,114,128,.2); color: var(--muted); }
        .badge-scheduled { background: rgba(52,211,153,.15); color: var(--green); }
        .rec-block {
          grid-column: 1 / -1; margin-top: 8px; background: rgba(79,195,247,.06);
          border: 1px solid rgba(79,195,247,.2); border-radius: 8px; padding: 12px 16px;
          display: flex; align-items: flex-start; gap: 10px;
        }
        .rec-icon { font-size: 20px; flex-shrink: 0; }
        .rec-text { font-size: 13px; color: var(--accent2); line-height: 1.5; }
        .rec-weather { font-size: 12px; color: var(--muted); margin-top: 2px; }
        .loader { display: flex; flex-direction: column; align-items: center; gap: 16px; padding: 60px 0; color: var(--muted); }
        .spinner { width: 36px; height: 36px; border: 3px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin .8s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .empty { text-align: center; padding: 60px 0; color: var(--muted); font-size: 14px; }
        footer { text-align: center; padding: 24px; font-size: 12px; color: var(--muted); border-top: 1px solid var(--border); }
    </style>
</head>
<body>
<header>
    <div class="logo">Field <span>Weather</span></div>
    <div><span class="status-dot"></span><span class="status-label">Live data</span></div>
</header>
<main>
    <div class="stats-bar">
        <div class="stat-card"><span class="stat-label">Total partidos</span><span class="stat-value" id="stat-total">—</span></div>
        <div class="stat-card"><span class="stat-label">Próximos</span><span class="stat-value" id="stat-future">—</span></div>
        <div class="stat-card"><span class="stat-label">Con recomendación</span><span class="stat-value" id="stat-rec">—</span></div>
    </div>
    <div class="toolbar">
        <div class="search-wrap">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
            </svg>
            <input type="text" id="search" placeholder="Buscar equipo o ciudad…"/>
        </div>
        <button class="filter-btn active" data-filter="all">Todos</button>
        <button class="filter-btn" data-filter="future">Próximos</button>
        <button class="filter-btn" data-filter="past">Jugados</button>
    </div>
    <p class="section-title">Partidos LaLiga 2025/26</p>
    <div id="loader" class="loader"><div class="spinner"></div><span>Cargando partidos…</span></div>
    <div class="matches-grid" id="grid-all"></div>
</main>
<footer>DacdTrabajo · es.ulpgc.datos · datos actualizados cada hora</footer>
<script>
    let allMatches = [];
    let currentFilter = 'all';
    let searchTerm = '';

    function isUpcoming(m) {
      if (!m.matchDate) return false;
      return new Date(m.matchDate.replace(" ", "T")) > new Date();
    }

    function formatDate(raw) {
      if (!raw) return '—';
      return new Date(raw.replace(" ", "T")).toLocaleDateString('es-ES', {
        weekday:'short', day:'numeric', month:'short', year:'numeric', hour:'2-digit', minute:'2-digit'
      });
    }

    function statusBadge(m) {
      if (isUpcoming(m)) return `<span class="status-badge badge-scheduled">Programado</span>`;
      return `<span class="status-badge badge-finished">Finalizado</span>`;
    }

    function recBlock(m) {
      if (!m.recommendation || !isUpcoming(m)) return '';
      const weather = (m.temperature != null && m.description)
        ? `<div class="rec-weather">🌡 ${m.temperature.toFixed(1)}°C — ${m.description}</div>` : '';
      return `
        <div class="rec-block">
          <span class="rec-icon">💬</span>
          <div>
            <div class="rec-text">${m.recommendation}</div>
            ${weather}
          </div>
        </div>`;
    }

    function cardHTML(m) {
      const cls = isUpcoming(m) ? 'future' : 'past';
      // CORREGIDO: Si es futuro muestra VS, si es pasado muestra los goles reales de la base de datos
      const score = isUpcoming(m) ? 'VS' : `${m.homeScore} - ${m.awayScore}`;
      return `
        <div class="match-card ${cls}">
          <div class="team-block">
            <span class="team-name">${m.homeTeam ?? '—'}</span>
            <span class="team-city">${m.city ?? ''}</span>
          </div>
          <div class="score-block">
            <span class="score">${score}</span>
            <span class="match-meta">${formatDate(m.matchDate)}</span>
            ${statusBadge(m)}
          </div>
          <div class="team-block right">
            <span class="team-name">${m.awayTeam ?? '—'}</span>
          </div>
          ${recBlock(m)}
        </div>`;
    }

    function render() {
      const filtered = allMatches.filter(m => {
        const q = searchTerm.toLowerCase();
        const textOk = !q || [m.homeTeam, m.awayTeam, m.city].join(' ').toLowerCase().includes(q);
        let filterOk = true;
        if (currentFilter === 'future') filterOk = isUpcoming(m);
        if (currentFilter === 'past')   filterOk = !isUpcoming(m);
        return textOk && filterOk;
      });
      const grid = document.getElementById('grid-all');
      grid.innerHTML = filtered.length === 0
        ? '<div class="empty">No se encontraron partidos.</div>'
        : filtered.map(cardHTML).join('');
    }

    function updateStats(matches) {
      document.getElementById('stat-total').textContent  = matches.length;
      document.getElementById('stat-future').textContent = matches.filter(isUpcoming).length;
      document.getElementById('stat-rec').textContent    = matches.filter(m => m.recommendation).length;
    }

    async function load() {
      try {
        const res = await fetch('/matches');
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        let data = await res.json();
        if (typeof data === 'string') data = JSON.parse(data);
        if (!Array.isArray(data)) data = Object.values(data);

        data.sort((a, b) => new Date(a.matchDate.replace(" ", "T")) - new Date(b.matchDate.replace(" ", "T")));

        allMatches = data;
        document.getElementById('loader').style.display = 'none';
        updateStats(data);
        render();
      } catch (err) {
        document.getElementById('loader').innerHTML =
          `<div class="empty">❌ Error: ${err.message}</div>`;
      }
    }

    document.getElementById('search').addEventListener('input', e => {
      searchTerm = e.target.value;
      render();
    });

    document.querySelectorAll('.filter-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        currentFilter = btn.dataset.filter;
        render();
      });
    });

    load();
    setInterval(load, 5 * 60 * 1000);
</script>
</body>
</html>
